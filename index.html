<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carmen Moubarak | Private Office Strategy</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Reliable CDNs for React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <!-- Premium Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            /* zinc-950 */
            color: #d4d4d8;
            /* zinc-300 */
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Smooth Entrance */
        .animate-fadeIn {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Dynamic Backgrounds */
        .bg-glow-cyan {
            background: radial-gradient(circle at center, rgba(34, 211, 238, 0.08) 0%, transparent 70%);
        }

        .bg-glow-coffee {
            background: radial-gradient(circle at center, rgba(193, 154, 107, 0.06) 0%, transparent 70%);
        }

        /* Modern Glassmorphism */
        .card-glass {
            background: rgba(24, 24, 27, 0.6);
            /* zinc-900 with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .card-glass:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .sidebar-glass {
            background: rgba(9, 9, 11, 0.85);
            /* zinc-950 */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Nav State */
        .active-tab {
            background: rgba(193, 154, 107, 0.12);
            color: #d4d4d8;
            /* Contrast adjustment */
        }

        .active-tab::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: #c19a6b;
            border-radius: 0 4px 4px 0;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar-glass {
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }

            .active-tab::before {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 3px;
                border-radius: 4px 4px 0 0;
            }

            .mobile-bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 50;
                padding-bottom: env(safe-area-inset-bottom);
            }

            .content-area {
                padding-bottom: 90px;
                /* Space for bottom nav */
            }
        }

        .text-accent-cyan {
            color: #22d3ee;
        }

        .text-accent-coffee {
            color: #c19a6b;
        }

        #root:empty::before {
            content: 'LOADING INTERFACE...';
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #09090b;
            color: #c19a6b;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #09090b;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            /* Make slider subtle */
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef } = React;

        const HCyan = ({ children }) => <span className="text-cyan-400 font-medium">{children}</span>;
        const HCoffee = ({ children }) => <span className="text-[#c19a6b] font-medium">{children}</span>;

        const Icon = ({ name, className = "w-5 h-5", ariaLabel }) => {
            const strokeW = "1.5";
            const icons = {
                briefcase: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>,
                brain: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0 .98 4.96 2.5 2.5 0 0 0 0 5 2.5 2.5 0 0 0-1.04 4.8 2.5 2.5 0 0 0 4.04.2 2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 4.04-.2 2.5 2.5 0 0 0-1.04-4.8 2.5 2.5 0 0 0 0-5 2.5 2.5 0 0 0 .98-4.96 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 12 4.5Z" /><path d="M12 4.5V8" /><path d="M16 8h-4" /><path d="M12 12h.01" /><path d="M8 16h4" /><path d="M12 16v4.5" /></svg>,
                camera: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></svg>,
                target: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></svg>,
                chart: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><line x1="12" x2="12" y1="20" y2="10" /><line x1="18" x2="18" y1="20" y2="4" /><line x1="6" x2="6" y1="20" y2="16" /></svg>,
                smartphone: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><rect width="14" height="20" x="5" y="2" rx="2" ry="2" /><path d="M12 18h.01" /></svg>,
                check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><polyline points="20 6 9 17 4 12" /></svg>,
                globe: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><circle cx="12" cy="12" r="10" /><line x1="2" x2="22" y1="12" y2="12" /></svg>,
                shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
                clock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
                film: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" className={className} aria-label={ariaLabel}><rect width="20" height="20" x="2" y="2" rx="2.18" ry="2.18" /><line x1="7" x2="7" y1="2" y2="22" /><line x1="17" x2="17" y1="2" y2="22" /><line x1="2" x2="7" y1="12" y2="12" /><line x1="2" x2="7" y1="7" y2="7" /><line x1="2" x2="7" y1="17" y2="17" /><line x1="17" x2="22" y1="12" y2="12" /><line x1="17" x2="22" y1="7" y2="7" /><line x1="17" x2="22" y1="17" y2="17" /></svg>
            };
            return icons[name] || null;
        };

        function OverviewTab() {
            return (
                <div className="space-y-6 md:space-y-10 animate-fadeIn">
                    <section className="card-glass p-6 md:p-12 rounded-2xl md:rounded-3xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 md:w-96 md:h-96 bg-glow-coffee opacity-40 pointer-events-none"></div>
                        <h2 className="text-3xl md:text-5xl font-serif text-white mb-8 tracking-tight capitalize leading-tight">Private Office<br />Strategic Mandate</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16 mb-8 md:mb-10 border-y border-white/5 py-8 md:py-10">
                            <article className="space-y-4">
                                <p className="text-xs text-coffee uppercase tracking-widest font-semibold">The Heritage</p>
                                <h3 className="text-zinc-100 font-medium text-xl font-serif">Carmen Moubarak</h3>
                                <p className="text-zinc-400 text-sm leading-relaxed font-light">
                                    Private Investment Advisor & Pulse Real Estate Sales Director. Focusing on HNWI & Institutional Investors. With <HCoffee>10+ years of visual mastery</HCoffee> backing your localized expertise, we position you as the ultimate authority in Dubai's ultra-prime sector.
                                </p>
                            </article>
                            <article className="space-y-4 md:border-l md:border-white/5 md:pl-12">
                                <p className="text-xs text-cyan-500 uppercase tracking-widest font-semibold">Execution Partner</p>
                                <h3 className="text-zinc-100 font-medium text-xl font-serif capitalize tracking-tight">Unifilms.pro</h3>
                                <p className="text-zinc-400 text-sm leading-relaxed font-light">
                                    We move beyond "standard brokerage marketing." Delivering the aesthetic perfection of traditional cinema, powered by the <HCyan>speed and intelligence</HCyan> of tomorrow's technology.
                                </p>
                            </article>
                        </div>

                        <div className="space-y-4 mt-8">
                            <h4 className="text-xs font-semibold text-coffee uppercase tracking-widest">Core Narrative Philosophy</h4>
                            <p className="text-zinc-200 text-xl md:text-3xl font-serif leading-snug italic border-l-2 border-coffee/50 pl-6 md:pl-8 text-opacity-90">
                                "I don't just sell square footage — I curate homes that reflect your rhythm, taste, and lifestyle."
                            </p>
                        </div>
                    </section>
                </div>
            );
        }

        function InspirationTab() {
            return (
                <div className="space-y-6 md:space-y-10 animate-fadeIn">
                    <section className="card-glass p-6 md:p-12 rounded-2xl md:rounded-3xl relative overflow-hidden">
                        <div className="absolute bottom-0 left-0 w-64 h-64 md:w-96 md:h-96 bg-glow-cyan opacity-20 pointer-events-none"></div>
                        <h2 className="text-3xl md:text-5xl font-serif text-white mb-6 tracking-tight capitalize leading-tight">Cinematic<br />Visual Aesthetics</h2>
                        <p className="text-zinc-400 text-sm md:text-base leading-relaxed font-light mb-12 max-w-3xl border-l-2 border-cyan-500/50 pl-6">
                            We don't create typical real estate content. We craft <HCyan>genuine cinema</HCyan>. By utilizing advanced color grading, moody lighting, and striking compositions, we build strong, unforgettable visual narratives that instantly separate you from the noise and attract ultra-high-net-worth attention.
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                            <div className="space-y-5 group">
                                <div className="rounded-2xl overflow-hidden border border-white/5 shadow-2xl relative aspect-[4/5] bg-zinc-900 border-b-2 border-b-coffee">
                                    <div className="absolute inset-0 bg-black/50 group-hover:bg-transparent transition-colors duration-700 z-10 pointer-events-none"></div>
                                    <img src="inspiration.webp" loading="lazy" decoding="async" alt="Strategic Visual Inspiration" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000" />
                                </div>
                                <div>
                                    <h3 className="text-coffee text-xs font-semibold uppercase tracking-widest pl-3 border-l-2 border-coffee mb-2">The Persona</h3>
                                    <p className="text-zinc-500 text-sm font-light pl-3">Elegant, distinct, and highly authoritative presence.</p>
                                </div>
                            </div>
                            <div className="space-y-5 md:mt-24 group">
                                <div className="rounded-2xl overflow-hidden border border-white/5 shadow-2xl relative aspect-[4/5] bg-zinc-900 border-b-2 border-b-cyan-400">
                                    <div className="absolute inset-0 bg-black/50 group-hover:bg-transparent transition-colors duration-700 z-10 pointer-events-none"></div>
                                    <img src="inspiration_cinema_1.webp" loading="lazy" decoding="async" alt="Cinematic Lighting" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000" />
                                </div>
                                <div>
                                    <h3 className="text-cyan-400 text-xs font-semibold uppercase tracking-widest pl-3 border-l-2 border-cyan-400 mb-2">The Atmosphere</h3>
                                    <p className="text-zinc-500 text-sm font-light pl-3">Moody, dramatic lighting reminiscent of high-end films.</p>
                                </div>
                            </div>
                            <div className="space-y-5 md:col-span-2 group">
                                <div className="rounded-2xl overflow-hidden border border-white/5 shadow-2xl relative aspect-[21/9] bg-zinc-900 border-b-2 border-b-red-900/50">
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent group-hover:opacity-0 transition-opacity duration-700 z-10 pointer-events-none"></div>
                                    <img src="inspiration_cinema_3_dubai.webp" loading="lazy" decoding="async" alt="Classic Convertible" className="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-1000" />
                                </div>
                                <div>
                                    <h3 className="text-red-400 text-xs font-semibold uppercase tracking-widest pl-3 border-l-2 border-red-500 mb-2">The Icon</h3>
                                    <p className="text-zinc-500 text-sm font-light pl-3">Cinematic lifestyle storytelling showcasing classic elegance and high status.</p>
                                </div>
                            </div>
                            <div className="space-y-5 md:col-span-2 group">
                                <div className="rounded-2xl overflow-hidden border border-white/5 shadow-2xl relative aspect-[21/9] bg-zinc-900 border-b-2 border-b-zinc-400">
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent group-hover:opacity-0 transition-opacity duration-700 z-10 pointer-events-none"></div>
                                    <img src="inspiration_cinema_2.webp" loading="lazy" decoding="async" alt="Luxurious Interior" className="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-1000" />
                                </div>
                                <div>
                                    <h3 className="text-zinc-300 text-xs font-semibold uppercase tracking-widest pl-3 border-l-2 border-zinc-500 mb-2">The Asset</h3>
                                    <p className="text-zinc-500 text-sm font-light pl-3">Capturing ultra-luxury properties with aesthetic perfection.</p>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        function AITab() {
            return (
                <div className="space-y-6 md:space-y-8 animate-fadeIn">
                    <section className="card-glass p-6 md:p-10 rounded-2xl md:rounded-3xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 md:w-96 md:h-96 bg-glow-cyan opacity-40 pointer-events-none"></div>
                        <h2 className="text-2xl md:text-4xl font-serif text-white mb-4 flex items-center capitalize tracking-tight">
                            <div className="p-3 bg-cyan-950/30 rounded-xl mr-4 border border-cyan-900/30">
                                <Icon name="brain" className="text-cyan-400 w-6 h-6 md:w-8 md:h-8" ariaLabel="AI Intelligence Icon" />
                            </div>
                            Proprietary AI Strategy
                        </h2>
                        <p className="text-zinc-400 text-sm max-w-3xl font-light leading-relaxed">
                            What no other agency in Dubai is currently offering. We utilize advanced <HCyan>Large Language Models (LLMs)</HCyan>, localized data tools, and custom NotebookLM environments to process the market in real-time.
                        </p>
                    </section>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
                        <section className="lg:col-span-7 card-glass p-6 md:p-10 rounded-2xl md:rounded-3xl">
                            <h3 className="text-xs font-semibold text-cyan-500 uppercase tracking-widest mb-8 border-b border-white/5 pb-4">Audience Psychology Index</h3>
                            <div className="space-y-8">
                                {[
                                    { topic: "EU Liquidity Concerns & ROI Shifts", score: 94 },
                                    { topic: "Inheritance Laws for French Investors", score: 88 },
                                    { topic: "Off-Market Asset Discretion in DIFC", score: 82 },
                                    { topic: "Golden Visa: 10-Year Residency Strategies", score: 78 }
                                ].map((item, idx) => (
                                    <div key={idx} className="group">
                                        <div className="flex justify-between text-xs mb-3 uppercase tracking-wider font-medium">
                                            <span className="text-zinc-300 group-hover:text-white transition-colors">{item.topic}</span>
                                            <span className="text-cyan-400 font-semibold">{item.score}%</span>
                                        </div>
                                        <div className="w-full bg-zinc-900 rounded-full h-1.5 overflow-hidden">
                                            <div className="h-full bg-cyan-500 transition-all duration-1000 ease-out" style={{ width: `${item.score}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section className="lg:col-span-5 bg-zinc-900 border border-white/5 p-6 md:p-10 rounded-2xl md:rounded-3xl flex flex-col justify-center relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-br from-coffee/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                            <h3 className="text-coffee font-serif text-xl mb-6 capitalize font-semibold relative z-10">Automated Precision</h3>
                            <div className="bg-black/30 p-6 rounded-xl text-sm text-zinc-300 leading-relaxed border border-white/5 mb-8 font-light relative z-10">
                                "If a new tax law worries French investors on a Tuesday, by Wednesday, we have the exact data and scripting ready for your cinematic briefing."
                            </div>
                            <a href="https://wa.me/971551823364?text=Hello%20Carmen,%20I%20am%20interested%20in%20the%20AI%20Strategy." target="_blank" className="relative z-10 w-full flex items-center justify-center py-4 bg-zinc-800 text-cyan-400 border border-white/5 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-zinc-700 hover:text-cyan-300 transition-all cursor-pointer">
                                Approve Strategy Engine
                            </a>
                        </section>
                    </div>
                </div>
            );
        }

        function SMMTab() {
            return (
                <div className="space-y-6 md:space-y-8 animate-fadeIn">
                    <section className="card-glass p-6 md:p-12 rounded-2xl md:rounded-3xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-80 h-80 bg-glow-cyan opacity-20 pointer-events-none"></div>
                        <header className="flex flex-col md:flex-row md:items-center space-y-4 md:space-y-0 md:space-x-8 mb-10 border-b border-white/5 pb-8">
                            <div className="p-4 bg-zinc-900 rounded-2xl border border-white/5 w-fit">
                                <Icon name="smartphone" className="text-cyan-400 w-8 h-8" ariaLabel="SMM Icon" />
                            </div>
                            <div>
                                <h2 className="text-3xl md:text-4xl font-serif text-white mb-2 capitalize">Social Media Ops</h2>
                                <p className="text-cyan-500 text-xs uppercase font-medium tracking-widest">Digital Flagship Store Management</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-12">
                            <div className="space-y-6">
                                <h3 className="text-cyan-400 text-xs font-semibold uppercase tracking-widest border-l-2 border-cyan-900 pl-4">Comprehensive Content Mix</h3>
                                <ul className="space-y-5 pt-2">
                                    <li className="flex items-start text-sm text-zinc-300 font-light leading-relaxed">
                                        <Icon name="check" className="text-cyan-500 w-4 h-4 mr-4 mt-0.5 flex-shrink-0" />
                                        <span><HCyan>Professional Carousels & Posts:</HCyan> High-impact static posts and data-driven multi-slide carousels for deep market analysis.</span>
                                    </li>
                                    <li className="flex items-start text-sm text-zinc-300 font-light leading-relaxed">
                                        <Icon name="check" className="text-cyan-500 w-4 h-4 mr-4 mt-0.5 flex-shrink-0" />
                                        <span><HCyan>Engagement Stories:</HCyan> Daily high-visibility updates to maintain consistent presence.</span>
                                    </li>
                                    <li className="flex items-start text-sm text-zinc-300 font-light leading-relaxed">
                                        <Icon name="check" className="text-cyan-500 w-4 h-4 mr-4 mt-0.5 flex-shrink-0" />
                                        <span><HCyan>Aesthetic Curation:</HCyan> Ensuring your visual grid reflects absolute <HCoffee>Quiet Luxury</HCoffee>.</span>
                                    </li>
                                    <li className="flex items-start text-sm text-zinc-500 italic font-light leading-relaxed mt-4 border-t border-white/5 pt-4">
                                        <Icon name="clock" className="text-zinc-600 w-4 h-4 mr-4 mt-0.5 flex-shrink-0" />
                                        <span>Note: The specific number of monthly posts is determined by your <HCyan>selected production plan</HCyan> (Strategic or Dominance).</span>
                                    </li>
                                </ul>
                            </div>
                            <div className="space-y-8">
                                <article>
                                    <h3 className="text-coffee text-xs font-semibold uppercase tracking-widest border-l-2 border-coffee/50 pl-4 mb-3">Concierge Service Bridge</h3>
                                    <p className="text-zinc-400 text-sm leading-relaxed font-light">
                                        Active monitoring of DMs and comments. We bridge high-value, qualified inquiries directly to your personal WhatsApp. No spam, only institutional flow.
                                    </p>
                                </article>
                                <article>
                                    <h3 className="text-coffee text-xs font-semibold uppercase tracking-widest border-l-2 border-coffee/50 pl-4 mb-3">Elite Content Adaptation</h3>
                                    <p className="text-zinc-400 text-sm leading-relaxed font-light">
                                        Every asset is tailored to build UHNWI trust. We bridge the language gap with <HCyan>Professional Subtitles (EN/FR)</HCyan> and high-status English captions.
                                    </p>
                                </article>
